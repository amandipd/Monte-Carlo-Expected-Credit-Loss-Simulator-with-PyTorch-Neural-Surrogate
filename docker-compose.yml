services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    command: python -m risk_engine.queue.consumer

  # Monte Carlo simulation producer (pushes jobs to Redis workers — not the ML API)
  api:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    command: python -m risk_engine.queue.producer

  surrogate-api:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ECL_CACHE_ENABLED: "true"
      ECL_CACHE_TTL: "86400"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      LLM_MOCK: "false"
    volumes:
      - ./models:/app/models:ro
    command: uvicorn risk_engine.surrogate.app:app --host 0.0.0.0 --port 8080 --app-dir src
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
